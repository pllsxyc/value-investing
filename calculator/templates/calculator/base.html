{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DCF 估值计算器{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'calculator/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="title-block">
            <a class="brand" href="{% url 'home' %}">DCF 估值计算器</a>
            <span class="sub">自由现金流折现法（FCFF + 永续增长终值），输入即时计算。</span>
        </div>
        <nav>
            <a class="btn-primary nav-calc" href="{% url 'calculator' %}">开始计算</a>
            {% if user.is_authenticated %}
                <span class="who">{{ user.username }}</span>
                <a href="{% url 'favorites' %}">收藏明细</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">退出</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">登录</a>
                <a href="{% url 'register' %}">注册</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
