{% extends 'calculator/base.html' %}
{% block title %}注册{% endblock %}
{% block content %}
<section class="auth-card card">
    <h1>注册</h1>
    <form method="post" class="dcf-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary" type="submit">创建账号</button>
    </form>
    <p class="muted">已有账号？<a href="{% url 'login' %}">登录</a></p>
</section>
{% endblock %}
